name: hikingspot
description: "HikingSpot – A're vaye."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  # ── Firebase ────────────────────────────────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3

  # ── Local notifications (shows FCM messages while app is in foreground) ──────
  flutter_local_notifications: ^17.2.3
  flutter:
    sdk: flutter

  flutter_map: ^7.0.2
  latlong2:   ^0.9.1

  # Device GPS — for "Use my current location"
  geolocator: ^13.0.2

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.2.0

  # HTTP & Networking
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # SignalR Realtime
  signalr_netcore: ^1.3.6

  # UI & UX
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  lottie: ^3.0.0
  badges: ^3.1.2
  intl: ^0.19.0
  timeago: ^3.6.1
  flutter_rating_bar: ^4.0.1
  smooth_page_indicator: ^1.1.0
  animated_text_kit: ^4.2.2

  # Utilities
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  
  url_launcher: ^6.3.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9


flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
